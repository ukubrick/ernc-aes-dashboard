name: Adquisición ERNC

on:
  schedule:
    - cron: "10 * * * *"   # Minuto :10 de cada hora UTC (distinto al CTM que va en el :05)
  workflow_dispatch:        # Permite ejecución manual desde GitHub Actions UI

jobs:
  adquirir:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Adquisición CEN (gen. real + PCP + CMG + limitaciones + SSCC)
        run: python Adquisicion_ernc.py
        timeout-minutes: 35   # si una query CEN se cuelga, no debe llevarse meteo/NASA
        env:
          CEN_USER_KEY:  ${{ secrets.CEN_USER_KEY }}
          CEN_OPS_KEY:   ${{ secrets.CEN_OPS_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}

      - name: Adquisición Open-Meteo (meteorología + forecast 7 días)
        run: python Adquisicion_meteo_ernc.py
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}

      - name: Adquisición NASA POWER (validación solar — 1 vez/día, 12 UTC)
        run: |
          if [ "$(date -u +%H)" = "12" ]; then
            python Adquisicion_nasa_ernc.py
          else
            echo "NASA POWER se corre solo a las 12 UTC (rezago diario). Saltando."
          fi
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}

      - name: Ping Streamlit Cloud (evitar hibernación)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            "https://ernc-aes-dashboard-4yjlhfjocytto8lxxidmkb.streamlit.app/" || true
